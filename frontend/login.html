<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录 · MiniStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 背景 */
    .auth-bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1600&q=60') center/cover no-repeat;
      filter: brightness(0.2) blur(4px);
    }

    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative; z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(17,17,24,0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo a {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; letter-spacing: 3px;
      color: var(--accent); text-decoration: none;
    }
    .auth-logo a span { color: var(--text); }
    .auth-logo p {
      font-size: 12px; color: var(--text3); margin-top: 4px;
    }

    .auth-title {
      font-size: 20px; font-weight: 700;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    /* TABS */
    .auth-tabs {
      display: flex; gap: 0;
      margin-bottom: 28px;
      background: var(--bg3);
      border-radius: 8px; padding: 4px;
    }
    .auth-tab {
      flex: 1; padding: 8px;
      text-align: center; font-size: 14px; font-weight: 500;
      color: var(--text2); border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none;
    }
    .auth-tab.active {
      background: var(--accent);
      color: #fff;
    }
    .auth-tab:hover:not(.active) { color: var(--text); }

    /* FORM */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px; color: var(--text2);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-size: 14px;
      font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text3); }

    /* 验证码 */
    .captcha-row { display: flex; gap: 10px; }
    .captcha-row .form-input { flex: 1; }
    .captcha-img {
      width: 100px; height: 44px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 4px;
      color: var(--text); cursor: pointer;
      flex-shrink: 0;
      user-select: none;
      position: relative; overflow: hidden;
    }
    .captcha-img::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 3px,
        rgba(255,255,255,0.03) 3px, rgba(255,255,255,0.03) 6px
      );
    }
    .captcha-text {
      position: relative; z-index: 1;
      transform: skewX(-5deg);
      text-shadow: 1px 1px 0 var(--accent);
    }

    .form-extra {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 24px;
    }
    .form-remember { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; }
    .form-remember input { accent-color: var(--accent); }
    .form-forgot { font-size: 13px; color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
    .form-forgot:hover { opacity: 0.8; }

    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--accent);
      color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    .btn-submit:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .auth-footer {
      text-align: center;
      font-size: 13px; color: var(--text3);
    }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    /* 第三方登录 */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; font-size: 12px; color: var(--text3);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .social-btns { display: flex; gap: 10px; margin-bottom: 20px; }
    .social-btn {
      flex: 1; padding: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text2);
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s; font-family: inherit;
    }
    .social-btn:hover { border-color: var(--accent); color: var(--text); }

    /* 提示信息 */
    .form-tip {
      font-size: 11px; color: var(--text3);
      margin-top: 6px; line-height: 1.5;
    }

    footer { position: relative; z-index: 1; }
  </style>
</head>
<body>

<div class="auth-bg"></div>

<nav style="position:relative;z-index:101;">
  <a href="index.html" class="logo">Mini<span>Stream</span></a>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="show-anime.html">日番</a></li>
    <li><a href="show-movie.html">剧场版</a></li>
  </ul>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="搜索动漫...">
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="index.html">Mini<span>Stream</span></a>
      <p>高清动漫在线观看平台</p>
    </div>

    <div class="auth-tabs">
      <a href="login.html" class="auth-tab active">用户登录</a>
      <a href="register.html" class="auth-tab">注册账号</a>
    </div>

    <div class="form-group">
      <label class="form-label">手机 / 登录账号</label>
      <input type="text" class="form-input" placeholder="请输入账号或手机号">
    </div>

    <div class="form-group">
      <label class="form-label">登录密码</label>
      <input type="password" class="form-input" placeholder="请输入密码">
    </div>

    <div class="form-group">
      <label class="form-label">验证码</label>
      <div class="captcha-row">
        <input type="text" class="form-input" placeholder="请输入验证码" maxlength="4">
        <div class="captcha-img" onclick="refreshCaptcha()" title="点击刷新">
          <span class="captcha-text" id="captcha-text">5740</span>
        </div>
      </div>
      <div class="form-tip">点击验证码图片可刷新</div>
    </div>

    <div class="form-extra">
      <label class="form-remember">
        <input type="checkbox" checked> 记住登录状态
      </label>
      <a href="#" class="form-forgot">忘记密码？</a>
    </div>

    <button class="btn-submit" onclick="doLogin()">登录账号</button>

    <div class="auth-footer">
      没有账号？<a href="register.html">点击立刻注册</a>
    </div>

  </div>
</div>

<footer style="position:relative;z-index:1;">
  <div class="footer-logo">MiniStream</div>
  <div class="footer-links">
    <a href="index.html">首页</a>
    <a href="show-anime.html">日番</a>
    <a href="show-movie.html">剧场版</a>
  </div>
  <div class="footer-text">© 2026 MiniStream · 仅供学习使用</div>
</footer>

<script>
  const chars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ';
  function genCaptcha() {
    return Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  }
  function refreshCaptcha() {
    document.getElementById('captcha-text').textContent = genCaptcha();
  }

  function doLogin() {
    const btn = document.querySelector('.btn-submit');
    btn.textContent = '登录中...';
    btn.disabled = true;
    setTimeout(() => {
      sessionStorage.setItem('ms_logged_in', '1');
      window.location.href = 'profile.html';
    }, 800);
  }
</script>
</body>
</html>
