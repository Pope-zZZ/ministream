<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜索结果 · MiniStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    .search-layout { padding: 28px 32px; }

    .search-header { margin-bottom: 28px; }
    .search-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text3); margin-bottom: 12px;
    }
    .search-breadcrumb a { color: var(--text3); text-decoration: none; transition: color 0.2s; }
    .search-breadcrumb a:hover { color: var(--accent); }

    .search-title {
      font-size: 22px; font-weight: 700; margin-bottom: 6px;
    }
    .search-title span { color: var(--accent); }
    .search-count { font-size: 13px; color: var(--text3); }

    /* 搜索框大版本 */
    .search-bar {
      display: flex; gap: 12px; margin-bottom: 32px;
      max-width: 600px;
    }
    .search-input-wrap {
      flex: 1; display: flex; align-items: center;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 0 16px; gap: 10px;
      transition: border-color 0.2s;
    }
    .search-input-wrap:focus-within { border-color: var(--accent); }
    .search-input-wrap input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 15px; font-family: inherit;
      padding: 12px 0;
    }
    .search-input-wrap input::placeholder { color: var(--text3); }
    .search-btn {
      padding: 12px 24px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap;
    }
    .search-btn:hover { background: var(--accent2); transform: translateY(-1px); }

    /* 结果网格 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    /* 加载状态 */
    .loading {
      text-align: center; padding: 60px 0; color: var(--text3);
    }
    .loading-spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 空结果 */
    .empty-result {
      text-align: center; padding: 80px 0; color: var(--text3);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-text { font-size: 15px; margin-bottom: 8px; color: var(--text2); }
    .empty-sub { font-size: 13px; }

    /* 热门搜索 */
    .hot-search { margin-top: 40px; }
    .hot-title {
      font-size: 15px; font-weight: 600; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .hot-title::before { content:''; display:block; width:3px; height:16px; background:var(--accent); border-radius:2px; }
    .hot-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .hot-tag {
      padding: 6px 16px; border-radius: 20px;
      background: var(--bg3); border: 1px solid var(--border);
      font-size: 13px; color: var(--text2); cursor: pointer;
      transition: all 0.2s; text-decoration: none;
    }
    .hot-tag:hover { border-color: var(--accent); color: var(--accent); }

    @media(max-width:768px) {
      .search-layout { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Mini<span>Stream</span></a>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="show-anime.html">日番</a></li>
    <li><a href="show-movie.html">剧场版</a></li>
    <li><a href="show-anime.html?filter=end">完结</a></li>
    <li><a href="show-anime.html?sort=hits">排行榜</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="nav-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="搜索动漫...">
    </div>
    <div id="nav-user-area"></div>
  </div>
</nav>

<div class="search-layout">

  <!-- 面包屑 -->
  <div class="search-header">
    <div class="search-breadcrumb">
      <a href="index.html">首页</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span>搜索结果</span>
    </div>
    <div class="search-title">搜索：<span id="keyword-display"></span></div>
    <div class="search-count" id="result-count"></div>
  </div>

  <!-- 搜索框 -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="输入关键词搜索...">
    </div>
    <button class="search-btn" onclick="doSearch()">搜索</button>
  </div>

  <!-- 结果区域 -->
  <div id="result-area">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>搜索中...</div>
    </div>
  </div>

</div>

<footer>
  <div class="footer-logo">MiniStream</div>
  <div class="footer-links">
    <a href="index.html">首页</a>
    <a href="show-anime.html">日番</a>
    <a href="show-movie.html">剧场版</a>
  </div>
  <div class="footer-text">© 2026 MiniStream · 仅供学习使用</div>
</footer>

<script src="api.js"></script>
<script src="search.js"></script>
<script>
  // 登录状态
  const area = document.getElementById('nav-user-area')
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser()
    area.innerHTML = `<a href="profile.html" class="nav-user-btn"><div class="nav-user-avatar">${user?.username?.slice(0,2).toUpperCase() || 'MS'}</div>我的</a>`
  } else {
    area.innerHTML = `<a href="login.html" class="nav-login-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>登录</a>`
  }

  // 样式
  const style = document.createElement('style')
  style.textContent = `.nav-login-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.2s}.nav-user-btn{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 6px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;text-decoration:none;transition:all 0.2s}.nav-user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}`
  document.head.appendChild(style)

  // 获取关键词
  const params = new URLSearchParams(window.location.search)
  const keyword = params.get('keyword') || ''

  document.getElementById('keyword-display').textContent = keyword
  document.getElementById('search-input').value = keyword
  document.title = `搜索"${keyword}" · MiniStream`

  // 执行搜索
  async function doSearch() {
    const kw = document.getElementById('search-input').value.trim()
    if (!kw) return
    if (kw !== keyword) {
      window.location.href = `search.html?keyword=${encodeURIComponent(kw)}`
      return
    }

    const area = document.getElementById('result-area')
    area.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>搜索中...</div></div>'

    try {
      const videos = await VideoAPI.search(kw)
      document.getElementById('result-count').textContent = `找到 ${videos.length} 个结果`

      if (videos.length === 0) {
        area.innerHTML = `
          <div class="empty-result">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">没有找到「${kw}」相关的动漫</div>
            <div class="empty-sub">换个关键词试试？</div>
          </div>
          <div class="hot-search">
            <div class="hot-title">热门搜索</div>
            <div class="hot-tags">
              <a href="search.html?keyword=咒术回战" class="hot-tag">咒术回战</a>
              <a href="search.html?keyword=芙莉莲" class="hot-tag">芙莉莲</a>
              <a href="search.html?keyword=我推的孩子" class="hot-tag">我推的孩子</a>
              <a href="search.html?keyword=地狱乐" class="hot-tag">地狱乐</a>
              <a href="search.html?keyword=异世界" class="hot-tag">异世界</a>
            </div>
          </div>`
        return
      }

      // 渲染结果卡片
      const grid = document.createElement('div')
      grid.className = 'card-grid'
      videos.forEach(v => {
        grid.innerHTML += `
          <a href="player.html?id=${v.id}" class="anime-card">
            <div class="card-thumb">
              <img src="${v.cover || 'https://images.unsplash.com/photo-1607604276583-eef5d176d035?w=300&q=70'}" alt="${v.title}">
              <div class="card-overlay">
                <div class="play-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                </div>
              </div>
              ${v.rating ? `<span class="card-badge pg">${v.rating}</span>` : ''}
              <span class="card-ep">${v.status === 'ready' ? '可播放' : '处理中'}</span>
            </div>
            <div class="card-info">
              <div class="card-title">${v.title}</div>
              <div class="card-meta">${v.genre || ''} · ${v.year || ''}</div>
            </div>
          </a>`
      })
      area.innerHTML = ''
      area.appendChild(grid)

    } catch (err) {
      area.innerHTML = `
        <div class="empty-result">
          <div class="empty-icon">⚠️</div>
          <div class="empty-text">搜索失败，请检查后端服务是否运行</div>
          <div class="empty-sub">${err.message}</div>
        </div>`
    }
  }

  // 回车搜索
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch()
  })

  // 页面加载时自动搜索
  if (keyword) doSearch()
</script>
</body>
</html>
