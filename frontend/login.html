<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录 · MiniStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1600&q=60') center/cover no-repeat;
      filter: brightness(0.2) blur(4px);
    }

    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative; z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(17,17,24,0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo a { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: var(--accent); text-decoration: none; }
    .auth-logo a span { color: var(--text); }
    .auth-logo p { font-size: 12px; color: var(--text3); margin-top: 4px; }

    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 28px;
      background: var(--bg3); border-radius: 8px; padding: 4px;
    }
    .auth-tab {
      flex: 1; padding: 8px; text-align: center; font-size: 14px; font-weight: 500;
      color: var(--text2); border-radius: 6px; cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .auth-tab:hover:not(.active) { color: var(--text); }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 8px; }
    .form-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text3); }

    .captcha-row { display: flex; gap: 10px; }
    .captcha-row .form-input { flex: 1; }
    .captcha-img {
      width: 100px; height: 44px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px;
      color: var(--text); cursor: pointer; flex-shrink: 0; user-select: none;
      position: relative; overflow: hidden;
    }
    .captcha-img::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.03) 3px, rgba(255,255,255,0.03) 6px);
    }
    .captcha-text { position: relative; z-index: 1; transform: skewX(-5deg); text-shadow: 1px 1px 0 var(--accent); }

    .form-extra {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 24px;
    }
    .form-remember { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; }
    .form-remember input { accent-color: var(--accent); }
    .form-forgot { font-size: 13px; color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
    .form-forgot:hover { opacity: 0.8; }

    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s; margin-bottom: 20px;
    }
    .btn-submit:hover { background: var(--accent2); transform: translateY(-1px); }

    .auth-footer { text-align: center; font-size: 13px; color: var(--text3); }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .form-tip { font-size: 11px; color: var(--text3); margin-top: 6px; }

    .error-msg {
      background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3);
      color: #f87171; border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }

    footer { position: relative; z-index: 1; }
  </style>
</head>
<body>

<div class="auth-bg"></div>

<nav style="position:relative;z-index:101;">
  <a href="index.html" class="logo">Mini<span>Stream</span></a>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="show-anime.html">日番</a></li>
    <li><a href="show-movie.html">剧场版</a></li>
  </ul>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="搜索动漫...">
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="index.html">Mini<span>Stream</span></a>
      <p>高清动漫在线观看平台</p>
    </div>

    <div class="auth-tabs">
      <a href="login.html" class="auth-tab active">用户登录</a>
      <a href="register.html" class="auth-tab">注册账号</a>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">手机 / 登录账号</label>
      <input type="text" id="username" class="form-input" placeholder="请输入账号">
    </div>

    <div class="form-group">
      <label class="form-label">登录密码</label>
      <input type="password" id="password" class="form-input" placeholder="请输入密码">
    </div>

    <div class="form-group">
      <label class="form-label">验证码</label>
      <div class="captcha-row">
        <input type="text" id="captcha" class="form-input" placeholder="请输入验证码" maxlength="4">
        <div class="captcha-img" onclick="refreshCaptcha()" title="点击刷新">
          <span class="captcha-text" id="captcha-text">5740</span>
        </div>
      </div>
      <div class="form-tip">点击验证码图片可刷新</div>
    </div>

    <div class="form-extra">
      <label class="form-remember">
        <input type="checkbox" checked> 记住登录状态
      </label>
      <a href="#" class="form-forgot">忘记密码？</a>
    </div>

    <button class="btn-submit" id="login-btn" onclick="doLogin()">登录账号</button>

    <div class="auth-footer">
      没有账号？<a href="register.html">点击立刻注册</a>
    </div>

  </div>
</div>

<footer style="position:relative;z-index:1;">
  <div class="footer-logo">MiniStream</div>
  <div class="footer-links">
    <a href="index.html">首页</a>
    <a href="show-anime.html">日番</a>
    <a href="show-movie.html">剧场版</a>
  </div>
  <div class="footer-text">© 2026 MiniStream · 仅供学习使用</div>
</footer>

<script src="api.js"></script>
<script>
  // 如果已登录直接跳转
  if (Auth.isLoggedIn()) {
    window.location.href = 'index.html'
  }

  const chars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ'
  let captchaCode = '5740'

  function refreshCaptcha() {
    captchaCode = Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('')
    document.getElementById('captcha-text').textContent = captchaCode
  }

  function showError(msg) {
    const el = document.getElementById('error-msg')
    el.textContent = msg
    el.style.display = 'block'
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value
    const captchaInput = document.getElementById('captcha').value.toUpperCase()

    if (!username || !password) {
      showError('请输入账号和密码')
      return
    }
    if (captchaInput !== captchaCode) {
      showError('验证码错误，请重新输入')
      refreshCaptcha()
      return
    }

    const btn = document.getElementById('login-btn')
    btn.textContent = '登录中...'
    btn.disabled = true
    document.getElementById('error-msg').style.display = 'none'

    try {
      const data = await Auth.login(username, password)
      Auth.saveLogin(data)
      window.location.href = 'index.html'
    } catch (err) {
      showError(err.message || '登录失败，请检查账号密码')
      btn.textContent = '登录账号'
      btn.disabled = false
      refreshCaptcha()
    }
  }

  // 回车登录
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin()
  })
</script>
</body>
</html>
